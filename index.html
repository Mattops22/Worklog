  <script type="text/babel" data-presets="react">
import { useState, useEffect, useRef } from "react";

const YELLOW = "#FFCD11";
const DARK = "#111111";
const SURFACE = "#1a1a1a";
const BORDER = "#2e2e2e";
const MUTED = "#555";
const TEXT = "#e8e8e8";

const COMPONENT_OPTIONS = [
  "Engine","Transmission","Transfer Case","Front Differential","Rear Differential",
  "Hydraulic System","Hydraulic Pump","Hydraulic Cylinder","Hydraulic Filter",
  "Final Drive (Left)","Final Drive (Right)","Swing Drive","Travel Motor (Left)","Travel Motor (Right)",
  "Cooling System","Radiator","Intercooler","Oil Cooler",
  "Fuel System","Fuel Pump","Fuel Filter","Injectors",
  "Air Filter","Turbocharger","Exhaust System","DPF",
  "Battery","Alternator","Starter Motor","Electrical System",
  "Brakes","Axle (Front)","Axle (Rear)","Steering System","Cab/ROPS",
  "Undercarriage","Track Adjuster","Idler","Sprocket","Rollers","Blade/Bucket",
  "Boom","Arm","Slewing Ring","Compressor","PTO","Gearbox","Other"
];

const genId = () => Math.random().toString(36).slice(2, 10);

const fmtDate = (d) => d ? new Date(d).toLocaleDateString("en-AU", { day:"2-digit", month:"short", year:"numeric" }) : "—";

// ─── STORAGE ────────────────────────────────────────────────────────────────
const load = (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

// ─── EXPORT ─────────────────────────────────────────────────────────────────
function exportCustomer(customer, machines, jobs) {
  const custMachines = machines.filter(m => m.customerId === customer.id);
  const custJobs = jobs.filter(j => j.customerId === customer.id).sort((a,b) => new Date(b.date)-new Date(a.date));

  const machineHTML = custMachines.map(m => {
    const mJobs = custJobs.filter(j => j.machineId === m.id);
    const compHTML = (m.components||[]).map(c => {
      const filterHTML = (c.filters||[]).length > 0
        ? (c.filters||[]).map(fi => `<div><strong>${fi.type||"Filter"}</strong>${fi.partNo ? ` — ${fi.partNo}` : ""}</div>`).join("")
        : "—";
      return `<tr>
        <td>${c.name}</td><td>${c.serialNo||"—"}</td><td>${c.oilType||"—"}</td>
        <td>${c.oilLitres ? c.oilLitres+"L" : "—"}</td><td>${filterHTML}</td>
      </tr>`;
    }).join("");
    const jobHTML = mJobs.map(j => `
      <div class="job-card">
        <div class="job-header">
          <span>${fmtDate(j.date)}</span>
          <span>${j.hours ? j.hours+" hrs / "+j.km+" km" : j.km+" km"}</span>
        </div>
        <p><strong>Work Carried Out:</strong></p>
        <p>${(j.workCarriedOut||"").replace(/\n/g,"<br>")}</p>
        ${j.parts ? `<p><strong>Parts Used:</strong></p><p>${j.parts.replace(/\n/g,"<br>")}</p>` : ""}
        ${j.notes ? `<p><strong>Notes:</strong> ${j.notes}</p>` : ""}
      </div>`).join("");
    return `
      <div class="machine-block">
        <h3 class="machine-title">${m.year||""} ${m.make} ${m.model}</h3>
        <table class="detail-table">
          <tr><th>Serial / VIN</th><td>${m.serialVin||"—"}</td><th>Hours / KM</th><td>${m.hoursKm||"—"}</td></tr>
          <tr><th>Type</th><td>${m.type||"—"}</td><th>Rego</th><td>${m.rego||"—"}</td></tr>
          <tr><th>Asset No.</th><td>${m.regAsset||"—"}</td><th></th><td></td></tr>
        </table>
        ${compHTML ? `
          <h4>Components</h4>
          <table class="comp-table">
            <thead><tr><th>Component</th><th>Serial No.</th><th>Oil Type</th><th>Litres</th><th>Filters</th></tr></thead>

// ─── COMBOBOX ────────────────────────────────────────────────────────────────
function Combobox({ value, onChange, options, placeholder }) {
  const [open, setOpen] = useState(false);
  const [filter, setFilter] = useState("");
  const ref = useRef();
  const filtered = options.filter(o => o.toLowerCase().includes((filter||value||"").toLowerCase()));
  useEffect(() => {
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  return (
    <div ref={ref} style={{ position: "relative" }}>
      <input
        style={S.input}
        value={value}
        placeholder={placeholder||"Select or type..."}
        onChange={e => { onChange(e.target.value); setFilter(e.target.value); setOpen(true); }}
        onFocus={() => { setFilter(""); setOpen(true); }}
      />
      {open && filtered.length > 0 && (
        <div style={{ position:"absolute", top:"100%", left:0, right:0, background:"#0d0d0d", border:`1px solid ${YELLOW}`, zIndex:100, maxHeight:200, overflowY:"auto", borderTop:"none" }}>
          {filtered.map(o => (
            <div key={o} style={{ padding:"8px 12px", cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", fontSize:14, color:TEXT }}
              onMouseDown={() => { onChange(o); setOpen(false); }}
              onMouseEnter={e => e.currentTarget.style.background="#222"}
              onMouseLeave={e => e.currentTarget.style.background="transparent"}>
              {o}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const addFilter = () => setComp(p => ({ ...p, filters: [...(p.filters||[]), { id:genId(), type:"", partNo:"" }] }));
  const updateFilter = (fid, field, val) => setComp(p => ({ ...p, filters: p.filters.map(fi => fi.id===fid ? {...fi,[field]:val} : fi) }));
  const removeFilter = (fid) => setComp(p => ({ ...p, filters: p.filters.filter(fi => fi.id!==fid) }));

  const saveComp = () => {
    if (!comp.name.trim()) return alert("Component name required");
    const cleaned = { ...comp, filters: (comp.filters||[]).filter(fi => fi.type||fi.partNo) };
    if (editComp !== null) {
      setF(p => { const c=[...p.components]; c[editComp]={...cleaned,id:c[editComp].id}; return {...p,components:c}; });
    } else {
      setF(p => ({ ...p, components: [...p.components, { ...cleaned, id:genId() }] }));
    }
    setComp({ name:"",serialNo:"",oilType:"",oilLitres:"",filters:[] });
    setShowCompForm(false); setEditComp(null);
  };

      </div>
      <div style={{ marginBottom:20 }}><label style={S.label}>Notes</label><textarea style={{ ...S.input, minHeight:50, resize:"vertical" }} value={f.notes} onChange={set("notes")} /></div>

        {f.components.map((c, i) => (

</head>

    <div class="inv-block">

  <!-- Bill To / Machine -->
  <div class="meta">
    <div class="meta-block">
      <label>Bill To</label>
      <div class="val">
        <strong>${customer.name}</strong><br>
        ${customer.company ? customer.company+"<br>" : ""}
        ${customer.address ? customer.address+"<br>" : ""}
        ${customer.phone || ""}${customer.phone && customer.email ? " | " : ""}${customer.email || ""}
        ${customer.abn ? "<br>ABN: "+customer.abn : ""}
      </div>
    </div>
    <div class="meta-block">
      <label>Machine</label>
      <div class="val">
        ${machine ? `<strong>${machine.year||""} ${machine.make} ${machine.model}</strong><br>
        ${machine.serialVin ? "S/N: "+machine.serialVin+"<br>" : ""}
        ${machine.rego ? "Rego: "+machine.rego+"<br>" : ""}
        ${job.hours ? "Hours: "+job.hours+"hrs" : ""}${job.hours && job.km ? " / " : ""}${job.km ? "KM: "+job.km : ""}` : "—"}
      </div>

  </div>

  <!-- Work Description -->
  <div class="job-summary">

  <div class="items-wrap">

      <thead>
        <tr>
          <th style="width:55%">Description</th>
          <th class="center" style="width:10%">Qty</th>
          <th class="right" style="width:17%">Rate (ex GST)</th>

  <div class="totals">
    <table class="totals-table">

      <tr class="gst"><td>GST (10%)</td><td>$${fmt(gst)}</td></tr>
      <tr class="total"><td>TOTAL DUE</td><td>$${fmt(total)}</td></tr>

  </div>

  ${job.parts ? `<div class="parts-section"><label>Parts / Materials Used</label><p>${job.parts.replace(/\n/g,"<br>")}</p></div>` : ""}

  <!-- Payment -->
  <div class="payment">
    <div>

      <div class="pay-detail">

        BSB: ${BIZ.payment.bsb}<br>

      </div>
      <div class="pay-note">Please use Invoice No. ${invoiceNo} as payment reference.</div>
    </div>

      <label>Amount Due</label>
      <div class="due">$${fmt(total)}</div>
      <div class="pay-note" style="margin-top:6px">Includes GST of $${fmt(gst)}</div>
      <div class="pay-note" style="margin-top:12px">Thank you for your business.</div>

  <div class="footer">Matt's Heavy Diesel Repairs — Snowy Mountains &nbsp;|&nbsp; ABN: ${BIZ.abn} &nbsp;|&nbsp; ${BIZ.phone} &nbsp;|&nbsp; ${BIZ.email}</div>
</div>
</body>
</html>`;

  return html;
}

function downloadInvoiceHTML(html, invoiceNo, customerName) {
  const blob = new Blob([html], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `Invoice-${invoiceNo}-${customerName.replace(/\s+/g,"-")}.html`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ─── JOB FORM ────────────────────────────────────────────────────────────────
function JobForm({ initial, customerId, customer, machines, onSave, onCancel, invoiceCounter, onInvoiceCreated, onInvoiceSaved }) {
  const custMachines = machines.filter(m => m.customerId === customerId);
  const [f, setF] = useState(initial || { date: new Date().toISOString().slice(0,10), machineId: custMachines[0]?.id||"", hours:"", km:"", workCarriedOut:"", parts:"", notes:"", lineItems:[], customerId });
  const set = k => e => setF(p => ({ ...p, [k]: e.target.value }));

  const addLineItem = () => setF(p => ({ ...p, lineItems: [...(p.lineItems||[]), { id:genId(), description:"", qty:"1", rate:"" }] }));
  const updateItem = (id, field, val) => setF(p => ({ ...p, lineItems: p.lineItems.map(i => i.id===id ? {...i,[field]:val} : i) }));
  const removeItem = (id) => setF(p => ({ ...p, lineItems: p.lineItems.filter(i => i.id!==id) }));

  const subtotal = (f.lineItems||[]).reduce((s,i) => s + (parseFloat(i.qty)||0)*(parseFloat(i.rate)||0), 0);
  const gst = subtotal * 0.1;
  const total = subtotal + gst;
  const fmt = n => n.toFixed(2);

  const handleSave = () => {
    if(!f.workCarriedOut.trim()) return alert("Work carried out is required");
    const job = { ...f, id: f.id||genId(), customerId };
    onSave(job);
  };

  const handleInvoice = () => {
    if(!f.workCarriedOut.trim()) return alert("Work carried out is required");
    const job = { ...f, id: f.id||genId(), customerId };
    const machine = machines.find(m => m.id === f.machineId);
    const invNo = String(invoiceCounter).padStart(4,"0");
    const subtotal = (job.lineItems||[]).reduce((s,i) => s+(parseFloat(i.qty)||0)*(parseFloat(i.rate)||0), 0);
    const total = subtotal * 1.1;
    const html = generateInvoice(customer, job, machine, invNo);
    const invoiceRecord = {
      id: genId(),
      invoiceNo: invNo,
      date: job.date,
      customerId: customer.id,
      customerName: customer.name,
      machineId: job.machineId,
      machineName: machine ? `${machine.year||""} ${machine.make} ${machine.model}`.trim() : "—",
      jobId: job.id,
      workCarriedOut: job.workCarriedOut,
      lineItems: job.lineItems||[],
      total: total,
      paid: false,
      html: html,
    };
    onSave(job);
    onInvoiceCreated();
    onInvoiceSaved(invoiceRecord);
    downloadInvoiceHTML(html, invNo, customer.name);
  };

  return (
    <div style={S.card}>
      <div style={S.h3}>{initial?.id ? "Edit Job" : "Log New Job"}</div>
      <div style={{ ...S.grid3, marginBottom:12 }}>
        <div><label style={S.label}>Date</label><input type="date" style={S.input} value={f.date} onChange={set("date")} /></div>
        <div><label style={S.label}>Machine</label>
          <select style={S.input} value={f.machineId} onChange={set("machineId")}>
            <option value="">— Select —</option>
            {custMachines.map(m => <option key={m.id} value={m.id}>{m.year||""} {m.make} {m.model}</option>)}
          </select>
        </div>
        <div><label style={S.label}>Machine Hours</label><input style={S.input} value={f.hours} onChange={set("hours")} type="number" /></div>
        <div><label style={S.label}>Odometer / KM</label><input style={S.input} value={f.km} onChange={set("km")} type="number" /></div>
      </div>
      <div style={{ marginBottom:12 }}><label style={S.label}>Work Carried Out *</label><textarea style={{ ...S.input, minHeight:100, resize:"vertical" }} value={f.workCarriedOut} onChange={set("workCarriedOut")} /></div>
      <div style={{ marginBottom:12 }}><label style={S.label}>Parts / Materials Used</label><textarea style={{ ...S.input, minHeight:70, resize:"vertical" }} value={f.parts} onChange={set("parts")} placeholder="Part numbers, descriptions, quantities..." /></div>
      <div style={{ marginBottom:20 }}><label style={S.label}>Additional Notes</label><textarea style={{ ...S.input, minHeight:50, resize:"vertical" }} value={f.notes} onChange={set("notes")} /></div>

      {/* Line Items */}
      <div style={{ borderTop:`1px solid ${BORDER}`, paddingTop:16, marginBottom:16 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
          <div>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:YELLOW }}>Invoice Line Items</span>
            <span style={{ color:MUTED, fontSize:12, marginLeft:10 }}>Labour, parts, callout fees etc.</span>
          </div>
          <button style={{ ...S.btn("ghost"), padding:"5px 14px", fontSize:12 }} onClick={addLineItem}>+ Add Line</button>
        </div>
        {(f.lineItems||[]).length === 0 && <div style={{ color:MUTED, fontSize:12, fontStyle:"italic", marginBottom:10 }}>No line items — add them here to generate an invoice with pricing.</div>}
        {(f.lineItems||[]).length > 0 && (
          <div style={{ marginBottom:8 }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 80px 110px auto", gap:8, marginBottom:6 }}>
              {["Description","Qty","Rate (ex GST)",""].map((h,i) => (
                <div key={i} style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif" }}>{h}</div>
              ))}
            </div>
            {(f.lineItems||[]).map(item => (
              <div key={item.id} style={{ display:"grid", gridTemplateColumns:"1fr 80px 110px auto", gap:8, marginBottom:8, alignItems:"center" }}>
                <input style={S.input} value={item.description} onChange={e=>updateItem(item.id,"description",e.target.value)} placeholder="e.g. Labour — engine service" />
                <input style={S.input} value={item.qty} onChange={e=>updateItem(item.id,"qty",e.target.value)} type="number" min="0" step="0.5" />
                <input style={{ ...S.input, textAlign:"right" }} value={item.rate} onChange={e=>updateItem(item.id,"rate",e.target.value)} type="number" min="0" step="0.01" placeholder="0.00" />
                <button style={{ ...S.btn("danger"), padding:"8px 10px", fontSize:13 }} onClick={() => removeItem(item.id)}>✕</button>
              </div>
            ))}
            <div style={{ display:"flex", justifyContent:"flex-end", marginTop:12, gap:0 }}>
              <div style={{ background:"#0d0d0d", border:`1px solid ${BORDER}`, borderRadius:2, overflow:"hidden", minWidth:220 }}>
                <div style={{ display:"flex", justifyContent:"space-between", padding:"7px 14px", fontSize:13, color:MUTED }}>
                  <span>Subtotal</span><span>${fmt(subtotal)}</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", padding:"7px 14px", fontSize:13, color:MUTED, borderTop:`1px solid ${BORDER}` }}>
                  <span>GST (10%)</span><span>${fmt(gst)}</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", padding:"9px 14px", fontFamily:"'Barlow Condensed',sans-serif", fontSize:17, fontWeight:700, color:YELLOW, background:"#0a0a0a", borderTop:`1px solid ${BORDER}` }}>
                  <span>TOTAL</span><span>${fmt(total)}</span>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
        <button style={S.btn()} onClick={handleSave}>Save Job</button>
        <button style={{ ...S.btn(), background:"#1a3a1a", color:"#7dcc7d", border:"1px solid #2d5a2d" }} onClick={handleInvoice}>⬡ Save &amp; Create Invoice</button>
        <button style={S.btn("ghost")} onClick={onCancel}>Cancel</button>
      </div>
    </div>
  );
}

// ─── CUSTOMER DETAIL ─────────────────────────────────────────────────────────
function CustomerDetail({ customer, machines, jobs, onBack, onUpdateCustomer, onUpdateMachines, onUpdateJobs, onInvoiceSaved }) {
  const [tab, setTab] = useState("machines");
  const [showEditCust, setShowEditCust] = useState(false);
  const [showMachineForm, setShowMachineForm] = useState(false);
  const [editMachine, setEditMachine] = useState(null);
  const [showJobForm, setShowJobForm] = useState(false);
  const [editJob, setEditJob] = useState(null);
  const [invoiceCounter, setInvoiceCounter] = useState(() => load("dlinvoicectr", 1));

  const custMachines = machines.filter(m => m.customerId === customer.id);
  const custJobs = jobs.filter(j => j.customerId === customer.id).sort((a,b)=>new Date(b.date)-new Date(a.date));

  const saveMachine = (m) => {
    const idx = machines.findIndex(x => x.id === m.id);
    const updated = idx >= 0 ? machines.map(x => x.id===m.id ? m : x) : [...machines, m];
    onUpdateMachines(updated); setShowMachineForm(false); setEditMachine(null);
  };
  const deleteMachine = (id) => { if(confirm("Delete this machine and all its data?")) onUpdateMachines(machines.filter(m=>m.id!==id)); };
  const saveJob = (j) => {
    const idx = jobs.findIndex(x => x.id === j.id);
    const updated = idx >= 0 ? jobs.map(x => x.id===j.id ? j : x) : [...jobs, j];
    onUpdateJobs(updated); setShowJobForm(false); setEditJob(null);
  };
  const deleteJob = (id) => { if(confirm("Delete this job record?")) onUpdateJobs(jobs.filter(j=>j.id!==id)); };

  const tabBtn = (key, label) => (
    <button onClick={() => setTab(key)} style={{ ...S.btn(tab===key?"primary":"ghost"), fontSize:13 }}>{label}</button>
  );

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:16, marginBottom:24 }}>
        <button style={{ ...S.btn("ghost"), fontSize:13 }} onClick={onBack}>← Back</button>
        <div style={{ flex:1 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:28, fontWeight:700, textTransform:"uppercase", letterSpacing:2, color:TEXT }}>{customer.name}</div>
          {customer.company && <div style={{ color:MUTED, fontSize:14, fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:1 }}>{customer.company}</div>}
        </div>
        <button style={S.btn("ghost")} onClick={() => exportCustomer(customer, machines, jobs)}>⬇ Export</button>
        <button style={S.btn("ghost")} onClick={() => setShowEditCust(true)}>Edit</button>
      </div>

      {showEditCust && <CustomerForm initial={customer} onSave={(c) => { onUpdateCustomer(c); setShowEditCust(false); }} onCancel={() => setShowEditCust(false)} />}

      {/* Info strip */}
      <div style={{ display:"flex", gap:24, background:SURFACE, border:`1px solid ${BORDER}`, borderRadius:3, padding:"14px 20px", marginBottom:24, flexWrap:"wrap" }}>
        {[["Phone",customer.phone],["Email",customer.email],["Address",customer.address],["ABN",customer.abn]].map(([l,v])=>v?(
          <div key={l}><div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif" }}>{l}</div><div style={{ fontSize:14, color:TEXT }}>{v}</div></div>
        ):null)}
        {customer.notes && <div><div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif" }}>Notes</div><div style={{ fontSize:14, color:TEXT }}>{customer.notes}</div></div>}
      </div>

      <div style={{ display:"flex", gap:8, marginBottom:20 }}>
        {tabBtn("machines", `Machines (${custMachines.length})`)}
        {tabBtn("jobs", `Service History (${custJobs.length})`)}
      </div>

      {tab === "machines" && (
        <div>
          {!showMachineForm && <button style={{ ...S.btn(), marginBottom:16 }} onClick={() => { setEditMachine(null); setShowMachineForm(true); }}>+ Add Machine</button>}
          {showMachineForm && <MachineForm initial={editMachine} customerId={customer.id} onSave={saveMachine} onCancel={() => { setShowMachineForm(false); setEditMachine(null); }} />}
          {custMachines.map(m => (
            <div key={m.id} style={{ ...S.card, borderLeft:`4px solid ${YELLOW}` }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
                <div>
                  <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:TEXT }}>{m.year||""} {m.make} {m.model}</div>
                  {m.type && <div style={{ color:MUTED, fontSize:13 }}>{m.type}</div>}
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <button style={{ ...S.btn("ghost"), fontSize:12, padding:"6px 12px" }} onClick={() => { setEditMachine(m); setShowMachineForm(true); }}>Edit</button>
                  <button style={{ ...S.btn("danger"), fontSize:12, padding:"6px 12px" }} onClick={() => deleteMachine(m.id)}>Delete</button>
                </div>
              </div>
              <div style={{ display:"flex", gap:24, flexWrap:"wrap", marginBottom: m.components?.length ? 16 : 0 }}>
                {[["Serial/VIN",m.serialVin],["Hours/KM",m.hoursKm],["Rego",m.rego],["Asset No.",m.regAsset]].map(([l,v])=>v?(
                  <div key={l}><div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif" }}>{l}</div><div style={{ fontSize:14, color:TEXT, fontFamily:"'Barlow Condensed',sans-serif" }}>{v}</div></div>
                ):null)}
              </div>
              {m.components?.length > 0 && (
                <div>
                  <div style={{ fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif", marginBottom:8 }}>Components</div>
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13, fontFamily:"'Barlow Condensed',sans-serif" }}>
                      <thead><tr style={{ background:"#0d0d0d" }}>
                        {["Component","Serial No.","Oil Type","Litres","Filters"].map(h=>(
                          <th key={h} style={{ padding:"6px 10px", textAlign:"left", color:YELLOW, fontSize:11, textTransform:"uppercase", letterSpacing:0.5, whiteSpace:"nowrap" }}>{h}</th>

                      <tbody>{m.components.map(c=>(
                        <tr key={c.id} style={{ borderBottom:`1px solid ${BORDER}` }}>

                          <td style={{ padding:"7px 10px", color:MUTED }}>{c.oilType||"—"}</td>
                          <td style={{ padding:"7px 10px", color:MUTED }}>{c.oilLitres ? c.oilLitres+"L" : "—"}</td>
                          <td style={{ padding:"7px 10px", color:MUTED }}>
                            {(c.filters||[]).length > 0
                              ? (c.filters||[]).map(fi => (
                                  <div key={fi.id} style={{ fontSize:12, lineHeight:1.6 }}>
                                    <span style={{ color:YELLOW, fontWeight:700 }}>{fi.type||"Filter"}</span>
                                    {fi.partNo && <span style={{ color:MUTED }}> — {fi.partNo}</span>}
                                  </div>

                          </td>
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          ))}
          {!custMachines.length && !showMachineForm && <div style={{ color:MUTED, fontStyle:"italic", fontSize:14 }}>No machines recorded. Add one above.</div>}
        </div>
      )}

      {tab === "jobs" && (
        <div>
          {!showJobForm && <button style={{ ...S.btn(), marginBottom:16 }} onClick={() => { setEditJob(null); setShowJobForm(true); }}>+ Log Job</button>}

          {custJobs.map(j => {
            const machine = machines.find(m => m.id === j.machineId);
            return (
              <div key={j.id} style={{ ...S.card, borderLeft:`4px solid ${BORDER}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                  <div>
                    <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:16, fontWeight:700, color:YELLOW, letterSpacing:1 }}>{fmtDate(j.date)}</div>
                    {machine && <div style={{ color:MUTED, fontSize:13, fontFamily:"'Barlow Condensed',sans-serif" }}>{machine.make} {machine.model} {machine.year||""}</div>}
                    {(j.hours||j.km) && <div style={{ color:MUTED, fontSize:12 }}>{j.hours ? j.hours+" hrs" : ""}{j.hours&&j.km ? " / " : ""}{j.km ? j.km+" km" : ""}</div>}
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <button style={{ ...S.btn("ghost"), fontSize:12, padding:"6px 12px" }} onClick={() => { setEditJob(j); setShowJobForm(true); }}>Edit</button>
                    <button style={{ ...S.btn("danger"), fontSize:12, padding:"6px 12px" }} onClick={() => deleteJob(j.id)}>Delete</button>
                  </div>
                </div>
                <div style={{ marginBottom:8 }}>
                  <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif", marginBottom:4 }}>Work Carried Out</div>
                  <div style={{ fontSize:14, color:TEXT, whiteSpace:"pre-wrap", lineHeight:1.5 }}>{j.workCarriedOut}</div>
                </div>
                {j.parts && <div style={{ marginBottom:8 }}>

                  <div style={{ fontSize:14, color:TEXT, whiteSpace:"pre-wrap", lineHeight:1.5 }}>{j.parts}</div>
                </div>}
                {j.notes && <div>
                  <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif", marginBottom:4 }}>Notes</div>
                  <div style={{ fontSize:13, color:MUTED }}>{j.notes}</div>
                </div>}
              </div>
            );
          })}
          {!custJobs.length && !showJobForm && <div style={{ color:MUTED, fontStyle:"italic", fontSize:14 }}>No jobs recorded. Log one above.</div>}
        </div>
      )}
    </div>
  );
}


// ─── INVOICES VIEW ───────────────────────────────────────────────────────────
function InvoicesView({ invoices, customers, machines, onTogglePaid, onDeleteInvoice }) {
  const [filter, setFilter] = useState("all"); // all | unpaid | paid
  const [search, setSearch] = useState("");

  const sorted = [...invoices].sort((a,b) => new Date(b.date)-new Date(a.date));
  const filtered = sorted.filter(inv => {
    const matchFilter = filter === "all" || (filter === "paid" && inv.paid) || (filter === "unpaid" && !inv.paid);
    const q = search.toLowerCase();
    const matchSearch = !q || inv.customerName?.toLowerCase().includes(q) || inv.invoiceNo?.includes(q) || inv.machineName?.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  const totalUnpaid = invoices.filter(i=>!i.paid).reduce((s,i)=>s+(i.total||0),0);
  const totalPaid = invoices.filter(i=>i.paid).reduce((s,i)=>s+(i.total||0),0);
  const fmt = n => n.toLocaleString("en-AU", {style:"currency", currency:"AUD"});

  return (
    <div>
      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:26, fontWeight:700, textTransform:"uppercase", letterSpacing:2, color:TEXT, marginBottom:20 }}>Invoices</div>

      {/* Summary strip */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:24 }}>
        {[
          ["Total Invoices", invoices.length, TEXT],
          ["Outstanding", fmt(totalUnpaid), "#e8a020"],
          ["Paid", fmt(totalPaid), "#5cb85c"],
        ].map(([label, val, col]) => (
          <div key={label} style={{ background:SURFACE, border:`1px solid ${BORDER}`, borderRadius:3, padding:"14px 18px" }}>
            <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif", marginBottom:6 }}>{label}</div>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:22, fontWeight:700, color:col }}>{val}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap" }}>
        <input style={{ ...S.input, flex:1, minWidth:180 }} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by customer, invoice no, machine..." />
        {["all","unpaid","paid"].map(f => (
          <button key={f} style={{ ...S.btn(filter===f?"primary":"ghost"), fontSize:12, textTransform:"capitalize" }} onClick={()=>setFilter(f)}>{f==="all"?"All":f==="unpaid"?"Outstanding":"Paid"}</button>
        ))}
      </div>

      {filtered.length === 0 && (
        <div style={{ color:MUTED, fontStyle:"italic", textAlign:"center", marginTop:60, fontSize:15 }}>
          {invoices.length === 0 ? "No invoices yet. Generate one from a job." : "No invoices match your filter."}
        </div>
      )}

      {filtered.map(inv => (
        <div key={inv.id} style={{ ...S.card, borderLeft:`4px solid ${inv.paid ? "#5cb85c" : "#e8a020"}`, marginBottom:10 }}>
          <div style={{ display:"flex", alignItems:"flex-start", gap:12, flexWrap:"wrap" }}>
            {/* Invoice no + date */}
            <div style={{ minWidth:90 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:18, fontWeight:700, color:YELLOW }}>#{inv.invoiceNo}</div>
              <div style={{ fontSize:11, color:MUTED }}>{new Date(inv.date).toLocaleDateString("en-AU",{day:"2-digit",month:"short",year:"numeric"})}</div>
            </div>
            {/* Customer + machine */}
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:15, fontWeight:700, textTransform:"uppercase", letterSpacing:0.5, color:TEXT }}>{inv.customerName}</div>
              <div style={{ fontSize:12, color:MUTED }}>{inv.machineName}</div>
              {inv.workCarriedOut && <div style={{ fontSize:12, color:MUTED, marginTop:2, overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis", maxWidth:400 }}>{inv.workCarriedOut.slice(0,80)}{inv.workCarriedOut.length>80?"…":""}</div>}
            </div>
            {/* Amount */}
            <div style={{ textAlign:"right", minWidth:110 }}>
              <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, color:inv.paid?"#5cb85c":"#e8a020" }}>{fmt(inv.total||0)}</div>
              <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:inv.paid?"#5cb85c":"#e8a020", fontFamily:"'Barlow Condensed',sans-serif" }}>{inv.paid?"PAID":"OUTSTANDING"}</div>
            </div>
            {/* Actions */}
            <div style={{ display:"flex", flexDirection:"column", gap:6, minWidth:100, flexShrink:0 }}>
              <button
                style={{ ...S.btn(inv.paid?"ghost":"primary"), fontSize:12, padding:"6px 12px", background:inv.paid?"#2a2a2a":YELLOW, color:inv.paid?TEXT:DARK }}
                onClick={() => onTogglePaid(inv.id)}>
                {inv.paid ? "Mark Unpaid" : "✓ Mark Paid"}
              </button>
              <button
                style={{ ...S.btn("ghost"), fontSize:12, padding:"6px 12px" }}
                onClick={() => {
                  if(inv.html) {
                    downloadInvoiceHTML(inv.html, inv.invoiceNo, inv.customerName);
                  } else {
                    alert("Invoice HTML not stored. Please regenerate from the job.");
                  }
                }}>
                ⬇ Download
              </button>
              <button
                style={{ ...S.btn("danger"), fontSize:12, padding:"6px 12px" }}
                onClick={() => { if(confirm("Delete this invoice record?")) onDeleteInvoice(inv.id); }}>
                Delete
              </button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
export default function App() {
  const [customers, setCustomers] = useState(() => load("dlcustomers", []));
  const [machines, setMachines] = useState(() => load("dlmachines", []));
  const [jobs, setJobs] = useState(() => load("dljobs", []));
  const [invoices, setInvoices] = useState(() => load("dlinvoices", []));
  const [view, setView] = useState("list"); // list | add | detail | invoices
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");

  useEffect(() => save("dlcustomers", customers), [customers]);
  useEffect(() => save("dlmachines", machines), [machines]);
  useEffect(() => save("dljobs", jobs), [jobs]);
  useEffect(() => save("dlinvoices", invoices), [invoices]);

  const updateCustomers = (list) => setCustomers(list);
  const saveCustomer = (c) => {
    const idx = customers.findIndex(x => x.id === c.id);
    const updated = idx >= 0 ? customers.map(x => x.id===c.id ? c : x) : [...customers, c];
    setCustomers(updated); setView("list");
  };
  const deleteCustomer = (id) => {
    if (!confirm("Delete this customer and ALL their machines and jobs?")) return;
    setCustomers(customers.filter(c => c.id !== id));
    setMachines(machines.filter(m => m.customerId !== id));
    setJobs(jobs.filter(j => j.customerId !== id));
    setView("list");
  };

  const saveInvoice = (inv) => setInvoices(prev => [inv, ...prev]);
  const togglePaid = (id) => setInvoices(prev => prev.map(i => i.id===id ? {...i, paid:!i.paid} : i));
  const deleteInvoice = (id) => setInvoices(prev => prev.filter(i => i.id!==id));
  const unpaidCount = invoices.filter(i=>!i.paid).length;

  const filtered = customers.filter(c => {
    const q = search.toLowerCase();
    return c.name?.toLowerCase().includes(q) || c.company?.toLowerCase().includes(q) || c.phone?.includes(q) || c.email?.toLowerCase().includes(q);
  }).sort((a,b) => a.name.localeCompare(b.name));

  return (
    <div style={{ minHeight:"100vh", background:DARK, color:TEXT, fontFamily:"'Barlow', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ background:"#0a0a0a", borderBottom:`3px solid ${YELLOW}`, padding:"0 16px" }}>
        <div style={{ maxWidth:900, margin:"0 auto", display:"flex", alignItems:"center", gap:0, height:52 }}>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, textTransform:"uppercase", letterSpacing:2, color:YELLOW, marginRight:16, whiteSpace:"nowrap" }}>⚙ DieselLog</div>
          {/* Nav tabs */}
          {["list","invoices"].map(v => {
            const labels = { list:"Customers", invoices: unpaidCount>0 ? `Invoices (${unpaidCount})` : "Invoices" };
            const active = view===v || (v==="list" && (view==="add"||view==="detail"));
            return (
              <button key={v} onClick={() => { setView(v); setSelected(null); }}
                style={{ background:"transparent", border:"none", borderBottom:`3px solid ${active?YELLOW:"transparent"}`, color:active?YELLOW:MUTED, fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, fontWeight:700, textTransform:"uppercase", letterSpacing:1, padding:"0 12px", height:52, cursor:"pointer", marginBottom:-3, whiteSpace:"nowrap" }}>
                {labels[v]}
              </button>
            );
          })}
          <div style={{ flex:1, minWidth:0 }} />
          {(view==="list"||view==="add"||view==="detail") && (
            <div style={{ fontSize:11, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", maxWidth:200 }}>
              {customers.length}c · {machines.length}m · {jobs.length}j
            </div>
          )}
        </div>
      </div>

      <div style={{ maxWidth:900, margin:"0 auto", padding:"20px 16px" }}>
        {view === "list" && (
          <div>
            <div style={{ display:"flex", gap:12, marginBottom:24 }}>
              <input
                style={{ ...S.input, flex:1 }}
                value={search}
                onChange={e=>setSearch(e.target.value)}
                placeholder="Search customers by name, company, phone, email..."
              />
              <button style={S.btn()} onClick={() => { setSelected(null); setView("add"); }}>+ New Customer</button>
            </div>
            {filtered.map(c => {
              const mCount = machines.filter(m=>m.customerId===c.id).length;
              const jCount = jobs.filter(j=>j.customerId===c.id).length;
              const lastJob = jobs.filter(j=>j.customerId===c.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
              return (
                <div key={c.id} style={{ ...S.card, cursor:"pointer", transition:"border-color 0.15s" }}
                  onClick={() => { setSelected(c); setView("detail"); }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=YELLOW}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=BORDER}>
                  <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                    <div style={{ flex:1 }}>
                      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, textTransform:"uppercase", letterSpacing:1, color:TEXT }}>{c.name}</div>
                      {c.company && <div style={{ fontSize:13, color:MUTED, fontFamily:"'Barlow Condensed',sans-serif" }}>{c.company}</div>}
                      <div style={{ display:"flex", gap:16, marginTop:4, flexWrap:"wrap" }}>
                        {c.phone && <span style={{ fontSize:12, color:MUTED }}>{c.phone}</span>}
                        {c.email && <span style={{ fontSize:12, color:MUTED }}>{c.email}</span>}
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:12, textAlign:"center", flexShrink:0 }}>
                      <div><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, color:YELLOW }}>{mCount}</div><div style={{ fontSize:9, color:MUTED, textTransform:"uppercase", letterSpacing:1 }}>Mach.</div></div>
                      <div><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:20, fontWeight:700, color:YELLOW }}>{jCount}</div><div style={{ fontSize:9, color:MUTED, textTransform:"uppercase", letterSpacing:1 }}>Jobs</div></div>
                      {lastJob && <div style={{ display:"none" }}><div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:13, fontWeight:700, color:MUTED }}>{fmtDate(lastJob.date)}</div><div style={{ fontSize:9, color:MUTED, textTransform:"uppercase", letterSpacing:1 }}>Last Job</div></div>}
                    </div>
                  </div>
                </div>
              );
            })}
            {!filtered.length && <div style={{ color:MUTED, fontStyle:"italic", textAlign:"center", marginTop:60, fontSize:16 }}>{search ? "No customers match your search." : "No customers yet. Add your first one."}</div>}
          </div>
        )}

        {view === "add" && (
          <div>
            <CustomerForm onSave={saveCustomer} onCancel={() => setView("list")} />
          </div>
        )}

        {view === "detail" && selected && (
          <CustomerDetail
            customer={customers.find(c=>c.id===selected.id)||selected}
            machines={machines}
            jobs={jobs}
            onBack={() => { setView("list"); setSelected(null); }}
            onUpdateCustomer={(c) => { setCustomers(cs=>cs.map(x=>x.id===c.id?c:x)); setSelected(c); }}
            onUpdateMachines={setMachines}
            onUpdateJobs={setJobs}
            onInvoiceSaved={saveInvoice}
          />
        )}

        {view === "invoices" && (
          <InvoicesView
            invoices={invoices}
            customers={customers}
            machines={machines}
            onTogglePaid={togglePaid}
            onDeleteInvoice={deleteInvoice}
          />
        )}
      </div>
    </div>
  );
}

  </script>

  <script>
    var _attempts = 0;
    function mount() {
      _attempts++;
      if (window.__DieselApp) {
        try {
          var root = ReactDOM.createRoot(document.getElementById("root"));
          root.render(React.createElement(window.__DieselApp));
          var splash = document.getElementById("splash");
          splash.style.opacity = "0";
          setTimeout(function(){ splash.style.display = "none"; }, 400);
        } catch(e) {
          document.getElementById("splash-err").style.display = "block";
          document.getElementById("splash-err").textContent = "Error: " + e.message;
          console.error(e);
        }
      } else if (_attempts < 100) {
        setTimeout(mount, 150);
      } else {
        document.getElementById("splash-err").style.display = "block";
        document.getElementById("splash-err").textContent = "Load timed out — please refresh.";
      }
    }
    setTimeout(mount, 200);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").catch(function(){});
      });
    }
  </script>
</body>
</html>
