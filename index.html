// ── IndexedDB for invoice storage ─────────────────────────────────────────
const DB_NAME = "mechlog-invoices", DB_VER = 1, STORE = "invoices";
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => res(true);
    tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const req = db.transaction(STORE).objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = () => rej(req.error);
  });
}
async function idbDel(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ── Data helpers ──────────────────────────────────────────────────────────
const STORAGE_KEY = "mechlog-customers-v1";
const COMPONENT_TYPES = ["Engine","Gearbox / Transmission","Differential","Transfer Case","Hydraulic System","Cooling System","Brake System","Fuel System","Air System","Other"];
const FILTER_CATEGORIES = ["Oil Filter","Primary Fuel Filter","Secondary Fuel Filter","Tertiary Fuel Filter","Air Filter","Cabin Air Filter","Hydraulic Filter","Transmission Filter","Differential Filter","Coolant Filter","Breather Filter","Other Filter"];
const JOB_TYPES = ["Scheduled Service","Oil & Filter Change","Full Service","Repair","Inspection","Pre-Purchase Check","Warranty Work","Other"];

function today() { return new Date().toISOString().slice(0,10); }
function clone(x){ return JSON.parse(JSON.stringify(x)); }

const mkFilter    = () => ({ id:uid(), category:"", partNumber:"" });
const mkEntry     = () => ({ id:uid(), date:today(), reading:"", jobType:"", oilType:"", oilQuantity:"", filters:[mkFilter()], notes:"", invoiceId:null });
const mkComponent = () => ({ id:uid(), type:"", model:"", serialNumber:"", serviceHistory:[mkEntry()] });
const mkMachine   = () => ({ id:uid(), make:"", model:"", year:"", vin:"", readingType:"km", components:[mkComponent()] });
const mkCustomer  = () => ({ id:uid(), name:"", phone:"", email:"", address:"", createdAt:new Date().toISOString(), machines:[mkMachine()] });

// ── Colours & mono font ───────────────────────────────────────────────────
const C = {
  white:"#ffffff", bg:"#f0f0f0", bg2:"#e6e6e6",
  border:"#cccccc", border2:"#bbbbbb",
  black:"#111111", dark:"#222222", mid:"#555555", mute:"#888888", light:"#aaaaaa",
  red:"#c0392b", redBg:"#fdf0f0",
  green:"#1e6b28", greenBg:"#f0f7f1",
  blue:"#1a4f8a", blueBg:"#eef4fc", blueBorder:"#99c0e8",
};
const mono = "'Courier New', Courier, monospace";
const sans = "'Helvetica Neue', Arial, sans-serif";

// ── Responsive width hook ─────────────────────────────────────────────────
function useWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return w;
}

// ── Base components ───────────────────────────────────────────────────────
const iStyle = { background:C.white, border:`1px solid ${C.border}`, color:C.dark, padding:"10px 12px", fontFamily:mono, fontSize:15, width:"100%", boxSizing:"border-box", outline:"none" };
const lStyle = { display:"block", fontFamily:mono, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:C.mute, marginBottom:5 };

function Lbl({ c }) { return <label style={lStyle}>{c}</label>; }
function Inp(p) { return <input style={iStyle} {...p} />; }
function Sel({ ch, ...p }) { return <select style={iStyle} {...p}>{ch}</select>; }
function Txt(p) { return <textarea style={{...iStyle, minHeight:80, resize:"vertical"}} {...p} />; }

function Btn({ ch, click, v="black", s={} }) {
  const m = {
    black:  { background:C.black,  color:C.white,  border:"none" },
    white:  { background:C.white,  color:C.dark,   border:`1px solid ${C.border2}` },
    ghost:  { background:"transparent", color:C.mid, border:`1px solid ${C.border}` },
    danger: { background:C.redBg,  color:C.red,    border:"1px solid #e0aaaa" },
    grey:   { background:C.bg2,    color:C.dark,   border:`1px solid ${C.border2}` },
    blue:   { background:C.blueBg, color:C.blue,   border:`1px solid ${C.blueBorder}` },
  };
  return <button onClick={click} style={{...m[v], padding:"10px 18px", cursor:"pointer", fontFamily:mono, fontSize:12, fontWeight:"bold", letterSpacing:1.5, textTransform:"uppercase", WebkitTapHighlightColor:"transparent", ...s}}>{ch}</button>;
}

function Grid({ cols=2, ch, mobile=1, bp=520 }) {
  const w = useWidth();
  return <div style={{display:"grid", gridTemplateColumns:`repeat(${w<bp?mobile:cols},1fr)`, gap:12, marginBottom:14}}>{ch}</div>;
}

function SecHead({ c }) { return <div style={{fontFamily:mono, fontSize:11, fontWeight:"bold", letterSpacing:3, textTransform:"uppercase", color:C.dark, borderBottom:`2px solid ${C.black}`, paddingBottom:7, marginBottom:16}}>{c}</div>; }
function SubHead({ c }) { return <div style={{fontFamily:mono, fontSize:10, fontWeight:"bold", letterSpacing:2, textTransform:"uppercase", color:C.mid, borderBottom:`1px solid ${C.border2}`, paddingBottom:6, marginBottom:14}}>{c}</div>; }
function Divider() { return <hr style={{border:"none", borderTop:`1px solid ${C.border}`, margin:"14px 0"}} />; }

function Flash({ f }) {
  if (!f) return null;
  const e = f.type === "err";
  return <div style={{background:e?C.redBg:C.greenBg, border:`1px solid ${e?"#e0aaaa":"#90c695"}`, color:e?C.red:C.green, padding:"10px 14px", marginBottom:14, fontFamily:mono, fontSize:12, letterSpacing:1}}>{e ? "[!] " : "[OK] "}{f.msg}</div>;
}

// ── Filter row ────────────────────────────────────────────────────────────
function FilterRow({ filter, onChange, onRemove, canRemove }) {

  if (narrow) return (

      <div style={{display:"flex", gap:8, alignItems:"flex-end"}}>

        {canRemove && <Btn v="danger" click={onRemove} ch="✕" s={{flexShrink:0, padding:"10px 14px"}} />}

  return (
    <div style={{display:"flex", gap:10, alignItems:"flex-end", marginBottom:10}}>
      <div style={{flex:"0 0 200px"}}><Lbl c="Filter Type" /><Sel ch={<><option value="">Select filter...</option>{FILTER_CATEGORIES.map(f=><option key={f}>{f}</option>)}</>} value={filter.category} onChange={e=>onChange("category",e.target.value)} /></div>
      <div style={{flex:1}}><Lbl c="Part Number" /><Inp value={filter.partNumber} onChange={e=>onChange("partNumber",e.target.value)} placeholder="e.g. 1R-0749" /></div>
      {canRemove && <Btn v="danger" click={onRemove} ch="✕" s={{flexShrink:0}} />}
    </div>

}

// ── Invoice uploader ──────────────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error); r.readAsDataURL(file); });
}

function InvoiceUploader({ invoiceId, onSaved, onRemoved }) {
  const [status,  setStatus]  = useState("idle");
  const [preview, setPreview] = useState(null);
  const [busy,    setBusy]    = useState(false);
  const ref = useRef();

  useEffect(() => {
    if (!invoiceId) { setStatus("idle"); setPreview(null); return; }
    setStatus("loading");
    idbGet(invoiceId).then(data => {
      if (data) { setPreview(data); setStatus("preview"); }
      else setStatus("idle");
    }).catch(() => setStatus("error"));
  }, [invoiceId]);

  const pick = async e => {
    const file = e.target.files?.[0]; if (!file) return;
    if (file.size > 10 * 1024 * 1024) { alert("File too large (max 10 MB)."); return; }
    setBusy(true);
    try {
      const dataUrl = await fileToBase64(file);
      const newId   = invoiceId || String(uid());
      const info    = { dataUrl, name:file.name, type:file.type };
      await idbSet(newId, info);
      setPreview(info); setStatus("preview"); onSaved(newId);
    } catch(err) { alert("Could not save file: " + err.message); }
    setBusy(false); e.target.value = "";
  };

  const remove = async () => {
    if (!confirm("Remove this invoice?")) return;
    if (invoiceId) await idbDel(invoiceId);
    setPreview(null); setStatus("idle"); onRemoved();
  };

  const viewFile = () => {
    if (!preview) return;
    const w = window.open();
    if (preview.type === "application/pdf" || preview.name?.endsWith(".pdf"))
      w.document.write(`<iframe src="${preview.dataUrl}" style="border:none;position:fixed;top:0;left:0;width:100%;height:100%"></iframe>`);
    else
      w.document.write(`<img src="${preview.dataUrl}" style="max-width:100%;display:block;margin:auto"/>`);
  };
  const dl = () => { if (!preview) return; const a=document.createElement("a"); a.href=preview.dataUrl; a.download=preview.name||"invoice"; a.click(); };
  const isPdf = preview && (preview.type==="application/pdf" || preview.name?.endsWith(".pdf"));

  return (
    <div style={{background:C.blueBg, border:`1px solid ${C.blueBorder}`, padding:"14px 16px"}}>
      <div style={{fontFamily:mono, fontSize:10, fontWeight:"bold", letterSpacing:2, textTransform:"uppercase", color:C.blue, marginBottom:12}}>Invoice / Job Sheet</div>
      {status==="loading" && <div style={{fontFamily:mono, fontSize:12, color:C.mute}}>Loading...</div>}
      {(status==="idle"||status==="error") && <>
        <input ref={ref} type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic" style={{display:"none"}} onChange={pick} />
        <Btn v="blue" click={()=>ref.current?.click()} ch={busy?"Uploading...":"Upload Invoice or Photo"} s={{fontSize:12}} />
        <div style={{fontFamily:mono, fontSize:10, color:C.mute, marginTop:8}}>PDF, JPG, PNG, HEIC — Max 10 MB</div>
        {status==="error" && <div style={{color:C.red, fontFamily:mono, fontSize:11, marginTop:6}}>Could not load saved file.</div>}
      </>}
      {status==="preview" && preview && <>
        {!isPdf && <div style={{marginBottom:10}}><img src={preview.dataUrl} alt="Invoice" style={{maxWidth:"100%", maxHeight:180, border:`1px solid ${C.border}`, display:"block"}} /></div>}
        {isPdf && <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:10, padding:"10px 14px", background:C.white, border:`1px solid ${C.border}`}}>
          <div style={{fontFamily:mono, fontSize:22, fontWeight:"bold", color:C.blue}}>PDF</div>
          <div><div style={{fontFamily:mono, fontSize:12, fontWeight:"bold"}}>{preview.name}</div><div style={{fontFamily:mono, fontSize:10, color:C.mute}}>PDF Document</div></div>
        </div>}
        <div style={{display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", marginBottom:8}}>
          <Btn v="blue"   click={viewFile} ch="View"     s={{fontSize:10, padding:"7px 14px"}} />
          <Btn v="white"  click={dl}       ch="Download" s={{fontSize:10, padding:"7px 14px"}} />
          <div style={{flex:1}} />
          <Btn v="danger" click={remove}   ch="Remove"   s={{fontSize:10, padding:"7px 14px"}} />
        </div>
        <div style={{fontFamily:mono, fontSize:10, color:C.mute}}>{preview.name}</div>
        <input ref={ref} type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.heic" style={{display:"none"}} onChange={pick} />
        <button onClick={()=>ref.current?.click()} style={{background:"none", border:"none", color:C.blue, fontFamily:mono, fontSize:10, cursor:"pointer", textDecoration:"underline", marginTop:8}}>Replace file</button>
      </>}
    </div>
  );
}

function InvoiceBadge({ invoiceId }) {
  const [info, setInfo] = useState(null);
  useEffect(()=>{ if(!invoiceId){setInfo(null);return;} idbGet(invoiceId).then(d=>d&&setInfo(d)).catch(()=>{}); },[invoiceId]);
  if (!info) return null;
  const isPdf = info.type==="application/pdf"||info.name?.endsWith(".pdf");
  const open=()=>{ const w=window.open(); isPdf?w.document.write(`<iframe src="${info.dataUrl}" style="border:none;position:fixed;top:0;left:0;width:100%;height:100%"></iframe>`):w.document.write(`<img src="${info.dataUrl}" style="max-width:100%;display:block;margin:auto"/>`); };
  const dl=()=>{ const a=document.createElement("a"); a.href=info.dataUrl; a.download=info.name||"invoice"; a.click(); };
  return (
    <div style={{display:"flex", gap:8, alignItems:"center", marginTop:8, padding:"8px 10px", background:C.blueBg, border:`1px solid ${C.blueBorder}`, flexWrap:"wrap"}}>
      <span style={{fontFamily:mono, fontSize:11, color:C.blue, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{isPdf?"PDF":"Image"} — {info.name||"Invoice"}</span>
      <button onClick={open} style={{background:"none",border:"none",color:C.blue,fontFamily:mono,fontSize:11,cursor:"pointer",textDecoration:"underline"}}>View</button>
      <button onClick={dl}   style={{background:"none",border:"none",color:C.blue,fontFamily:mono,fontSize:11,cursor:"pointer",textDecoration:"underline"}}>Download</button>
    </div>
  );
}

// ── Entry form ────────────────────────────────────────────────────────────
function EntryForm({ entry, readingType, onField, onAddFilter, onUpdFilter, onDelFilter }) {
  return <>
    <Grid cols={3} mobile={1} bp={580} ch={<>
      <div><Lbl c="Service Date" /><Inp type="date" value={entry.date} onChange={e=>onField("date",e.target.value)} /></div>
      <div><Lbl c={readingType==="hours"?"Machine Hours":"Odometer (km)"} /><Inp value={entry.reading} onChange={e=>onField("reading",e.target.value)} placeholder={readingType==="hours"?"e.g. 1450":"e.g. 85000"} /></div>
      <div><Lbl c="Job Type" /><Sel ch={<><option value="">Select...</option>{JOB_TYPES.map(j=><option key={j}>{j}</option>)}</>} value={entry.jobType} onChange={e=>onField("jobType",e.target.value)} /></div>
    </>} />
    <Grid cols={2} mobile={1} bp={480} ch={<>
      <div><Lbl c="Oil / Fluid Type" /><Inp value={entry.oilType} onChange={e=>onField("oilType",e.target.value)} placeholder="e.g. 15W-40 Full Synthetic" /></div>
      <div><Lbl c="Oil Quantity (L)" /><Inp value={entry.oilQuantity} onChange={e=>onField("oilQuantity",e.target.value)} placeholder="e.g. 14" /></div>
    </>} />
    <div style={{marginBottom:14}}>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
        <Lbl c="Filters Replaced" />
        <Btn v="grey" click={onAddFilter} ch="+ Add Filter" s={{fontSize:10, padding:"6px 12px"}} />
      </div>
      {entry.filters.map((f,fi)=>(
        <FilterRow key={f.id} filter={f} onChange={(field,val)=>onUpdFilter(fi,field,val)} onRemove={()=>onDelFilter(fi)} canRemove={entry.filters.length>1} />
      ))}
    </div>
    <div><Lbl c="Notes / Observations" /><Txt value={entry.notes} onChange={e=>onField("notes",e.target.value)} placeholder="Findings, warnings, next service recommendations..." /></div>
  </>;
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const [customers, setCustomers] = useState([]);
  const [view,      setView]      = useState("list");
  const [selected,  setSelected]  = useState(null);
  const [form,      setForm]      = useState(null);
  const [mTab,      setMTab]      = useState(0);
  const [cTab,      setCTab]      = useState(0);
  const [hIdx,      setHIdx]      = useState(0);
  const [search,    setSearch]    = useState("");
  const [flash,     setFlash]     = useState(null);
  const w = useWidth();
  const mobile = w < 540;

  useEffect(()=>{
    try { const r=localStorage.getItem(STORAGE_KEY); if(r) setCustomers(JSON.parse(r)); } catch{}
  },[]);

  const persist = d => { try{localStorage.setItem(STORAGE_KEY,JSON.stringify(d));}catch{} setCustomers(d); };
  const notify  = (msg,type="ok") => { setFlash({msg,type}); setTimeout(()=>setFlash(null),2800); };
  const startNew   = () => { setForm(mkCustomer()); setMTab(0); setCTab(0); setHIdx(0); setView("form"); };
  const startEdit  = c  => { setForm(clone(c));     setMTab(0); setCTab(0); setHIdx(0); setView("form"); };
  const openDetail = c  => { setSelected(c); setView("detail"); };

  const saveForm = () => {
    if (!form.name.trim()) { notify("Customer name is required","err"); return; }
    const updated = customers.find(c=>c.id===form.id) ? customers.map(c=>c.id===form.id?form:c) : [...customers,form];
    persist(updated); notify("Record saved"); setView("list");
  };
  const delCustomer = id => {
    if (!confirm("Delete this record permanently?")) return;
    persist(customers.filter(c=>c.id!==id)); setView("list");
  };

  const upd = (path,value) => {
    setForm(prev=>{
      const next=clone(prev); const keys=path.split(".");
      let cur=next; for(let i=0;i<keys.length-1;i++) cur=cur[keys[i]];
      cur[keys[keys.length-1]]=value; return next;
    });
  };

  const gmi = f      => Math.min(mTab,(f?.machines?.length??1)-1);
  const gci = (f,mi) => Math.min(cTab,(f?.machines?.[mi]?.components?.length??1)-1);
  const ghi = (f,mi,ci) => Math.min(hIdx,(f?.machines?.[mi]?.components?.[ci]?.serviceHistory?.length??1)-1);

  const addMachine = () => { const i=form.machines.length; setForm(p=>({...p,machines:[...p.machines,mkMachine()]})); setMTab(i); setCTab(0); setHIdx(0); };
  const delMachine = mi => { if(form.machines.length<=1)return; setForm(p=>({...p,machines:p.machines.filter((_,i)=>i!==mi)})); setMTab(t=>Math.max(0,t-1)); setCTab(0); setHIdx(0); };
  const addComp    = mi => { const i=form.machines[mi].components.length; setForm(p=>{const n=clone(p);n.machines[mi].components.push(mkComponent());return n;}); setCTab(i); setHIdx(0); };
  const delComp    = (mi,ci) => { if(form.machines[mi].components.length<=1)return; setForm(p=>{const n=clone(p);n.machines[mi].components.splice(ci,1);return n;}); setCTab(t=>Math.max(0,t-1)); setHIdx(0); };
  const addEntry   = (mi,ci) => { setForm(p=>{const n=clone(p);n.machines[mi].components[ci].serviceHistory.unshift(mkEntry());return n;}); setHIdx(0); };
  const delEntry   = (mi,ci,hi) => { if(form.machines[mi].components[ci].serviceHistory.length<=1)return; setForm(p=>{const n=clone(p);n.machines[mi].components[ci].serviceHistory.splice(hi,1);return n;}); setHIdx(t=>Math.max(0,t-1)); };
  const updEntry   = (mi,ci,hi,field,value) => { setForm(p=>{const n=clone(p);n.machines[mi].components[ci].serviceHistory[hi][field]=value;return n;}); };
  const addFilt    = (mi,ci,hi) => { setForm(p=>{const n=clone(p);n.machines[mi].components[ci].serviceHistory[hi].filters.push(mkFilter());return n;}); };
  const updFilt    = (mi,ci,hi,fi,field,value) => { setForm(p=>{const n=clone(p);n.machines[mi].components[ci].serviceHistory[hi].filters[fi][field]=value;return n;}); };
  const delFilt    = (mi,ci,hi,fi) => { setForm(p=>{const n=clone(p);const fl=n.machines[mi].components[ci].serviceHistory[hi].filters;if(fl.length>1)fl.splice(fi,1);return n;}); };

  const filtered = customers.filter(c=>
    c.name?.toLowerCase().includes(search.toLowerCase())||c.phone?.includes(search)||
    c.machines?.some(m=>m.model?.toLowerCase().includes(search.toLowerCase())||m.vin?.toLowerCase().includes(search.toLowerCase()))
  );

  const safeAreaTop = "env(safe-area-inset-top)";
  const headerHeight = 54;
  const pad = mobile ? "12px" : "20px";
  const pnl = { background:C.white, border:`1px solid ${C.border}`, padding:pad, marginBottom:14 };

  const Hdr = ({ acts }) => (
    <div style={{background:C.white, borderBottom:`3px solid ${C.black}`, padding:`${safeAreaTop} ${mobile?12:24}px 0`, display:"flex", alignItems:"center", justifyContent:"space-between", minHeight:headerHeight, position:"sticky", top:0, zIndex:100, boxShadow:"0 2px 6px rgba(0,0,0,0.08)"}}>
      <div style={{fontFamily:mono, fontSize:mobile?14:17, fontWeight:"bold", letterSpacing:3, color:C.black, textTransform:"uppercase", display:"flex", alignItems:"center", gap:8, paddingBottom:10}}>
        MechLog <span style={{background:C.black, color:C.white, fontSize:8, padding:"2px 6px", letterSpacing:2}}>PRO</span>
      </div>
      <div style={{display:"flex", gap:6, paddingBottom:10}}>{acts}</div>
    </div>
  );

  const TBtn = ({a,click,ch}) => (
    <button onClick={click} style={{padding:mobile?"7px 11px":"7px 16px", cursor:"pointer", fontFamily:mono, fontSize:mobile?10:11, fontWeight:"bold", letterSpacing:1, textTransform:"uppercase", background:a?C.black:C.white, color:a?C.white:C.mid, border:`2px solid ${a?C.black:C.border}`, marginRight:4, marginBottom:4, whiteSpace:"nowrap"}}>{ch}</button>
  );
  const SBtn = ({a,click,ch}) => (
    <button onClick={click} style={{padding:mobile?"6px 10px":"5px 14px", cursor:"pointer", fontFamily:mono, fontSize:10, letterSpacing:1, textTransform:"uppercase", background:a?C.bg2:C.white, color:a?C.dark:C.mute, border:`1px solid ${a?C.border2:C.border}`, marginRight:3, marginBottom:4, whiteSpace:"nowrap"}}>{ch}</button>
  );

  const detRow = (label,value) => !value ? null : (
    <div style={{display:"flex", padding:"9px 0", borderBottom:`1px solid ${C.bg}`, fontSize:15, flexWrap:"wrap", gap:8}}>
      <div style={{fontFamily:mono, fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:C.mute, width:110, paddingTop:2}}>{label}</div>
      <div style={{flex:1}}>{value}</div>
    </div>
  );

  // ── LIST ─────────────────────────────────────────────────────────────────
  if (view==="list") return (
    <div style={{minHeight:"100vh", background:C.bg, fontFamily:sans, color:C.dark}}>
      <Hdr acts={[<span key="c" style={{fontFamily:mono, fontSize:10, color:C.mute}}>{customers.length} REC</span>]} />
      <div style={{maxWidth:860, margin:"0 auto", padding:`20px ${mobile?12:20}px`}}>
        <Flash f={flash} />
        <div style={{display:"flex", gap:10, marginBottom:20}}>
          <Inp style={{flex:1, fontSize:16}} placeholder="Search name, phone, model, VIN..." value={search} onChange={e=>setSearch(e.target.value)} />
          <Btn v="black" click={startNew} ch={mobile?"+ New":"+ New Record"} />
        </div>
        {filtered.length===0 && <div style={{textAlign:"center", color:C.mute, padding:"80px 0", fontFamily:mono, fontSize:13}}>{customers.length===0?"No records yet. Tap + New Record to start.":"No results found."}</div>}
        {filtered.map(c=>(
          <div key={c.id} onClick={()=>openDetail(c)}
            style={{background:C.white, border:`1px solid ${C.border}`, borderLeft:`4px solid ${C.black}`, padding:"16px", marginBottom:10, cursor:"pointer", boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
            <div style={{display:"flex", justifyContent:"space-between"}}>
              <div style={{minWidth:0, flex:1}}>
                <div style={{fontSize:17, fontWeight:"bold", marginBottom:3}}>{c.name}</div>
                <div style={{fontFamily:mono, color:C.mid, fontSize:12, marginBottom:8, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{[c.phone,c.email].filter(Boolean).join("  ·  ")}</div>
                <div style={{display:"flex", flexWrap:"wrap", gap:4}}>
                  {c.machines?.map((m,i)=><span key={i} style={{background:C.bg, border:`1px solid ${C.border}`, fontFamily:mono, fontSize:10, padding:"2px 8px", color:C.mid}}>{[m.year,m.make,m.model].filter(Boolean).join(" ")||"Unnamed"}</span>)}
                </div>
              </div>
              <div style={{fontFamily:mono, fontSize:10, color:C.light, marginLeft:10, whiteSpace:"nowrap"}}>{new Date(c.createdAt).toLocaleDateString("en-AU")}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── DETAIL ────────────────────────────────────────────────────────────────
  if (view==="detail") {
    const c = customers.find(x=>x.id===selected?.id)||selected;
    if (!c) { setView("list"); return null; }
    return (
      <div style={{minHeight:"100vh", background:C.bg, fontFamily:sans, color:C.dark}}>
        <Hdr acts={[
          <Btn key="b" v="ghost"  click={()=>setView("list")}    ch="← Back"  s={{fontSize:10, padding:"7px 12px"}} />,
          <Btn key="e" v="white"  click={()=>startEdit(c)}       ch="Edit"    s={{fontSize:10, padding:"7px 12px"}} />,
          <Btn key="d" v="danger" click={()=>delCustomer(c.id)}  ch="Delete"  s={{fontSize:10, padding:"7px 12px"}} />,
        ]} />
        <div style={{maxWidth:860, margin:"0 auto", padding:`20px ${mobile?12:20}px`}}>
          <h2 style={{fontSize:24, fontWeight:"bold", marginBottom:4}}>{c.name}</h2>
          <div style={{fontFamily:mono, color:C.light, fontSize:10, letterSpacing:2, marginBottom:22}}>{new Date(c.createdAt).toLocaleDateString("en-AU")}</div>
          <div style={pnl}>
            <SecHead c="Contact Details" />
            {detRow("Phone",c.phone)}{detRow("Email",c.email)}{detRow("Address",c.address)}
          </div>
          {c.machines?.map((m,mi)=>(
            <div key={m.id} style={pnl}>
              <SecHead c={`Machine ${mi+1} — ${[m.year,m.make,m.model].filter(Boolean).join(" ")||"Unnamed"}`} />
              {detRow("Make",m.make)}{detRow("Model",m.model)}{detRow("Year",m.year)}{detRow("VIN",m.vin)}{detRow("Reading",m.readingType==="hours"?"Machine Hours":"Kilometres")}
              {m.components?.map((comp,ci)=>(
                <div key={comp.id} style={{background:C.bg, border:`1px solid ${C.border}`, padding:"14px", marginTop:14}}>
                  <SubHead c={[comp.type,comp.model].filter(Boolean).join(" — ")||`Component ${ci+1}`} />
                  {comp.serialNumber && detRow("Serial No.",comp.serialNumber)}
                  {comp.serviceHistory?.map(e=>(
                    <div key={e.id} style={{background:C.white, border:`1px solid ${C.border}`, padding:"12px", marginBottom:8}}>
                      <div style={{display:"flex", flexWrap:"wrap", gap:8, alignItems:"center", marginBottom:8}}>
                        <span style={{fontFamily:mono, fontWeight:"bold", fontSize:14}}>{e.date}</span>
                        {e.reading && <span style={{fontFamily:mono, fontSize:12, color:C.mid}}>{e.reading} {m.readingType==="hours"?"hrs":"km"}</span>}
                        {e.jobType && <span style={{fontFamily:mono, fontSize:10, background:C.bg2, border:`1px solid ${C.border}`, padding:"2px 8px", color:C.mid}}>{e.jobType}</span>}
                        {e.invoiceId && <span style={{fontFamily:mono, fontSize:10, background:C.blueBg, border:`1px solid ${C.blueBorder}`, padding:"2px 8px", color:C.blue}}>Invoice</span>}
                      </div>
                      {(e.oilType||e.oilQuantity) && <div style={{fontSize:14, marginBottom:5}}><span style={{fontFamily:mono, fontSize:10, color:C.mute, marginRight:8}}>OIL</span>{[e.oilType,e.oilQuantity?e.oilQuantity+"L":""].filter(Boolean).join(" — ")}</div>}
                      {e.filters?.filter(f=>f.category||f.partNumber).map((f,fi)=>(
                        <div key={fi} style={{fontSize:13, color:C.mid, marginBottom:3}}><span style={{fontFamily:mono, fontSize:10, color:C.mute, marginRight:8}}>FILTER</span>{[f.category,f.partNumber].filter(Boolean).join(" — ")}</div>
                      ))}
                      {e.notes && <div style={{marginTop:8, fontSize:13, color:C.mid, borderTop:`1px solid ${C.bg}`, paddingTop:8, fontStyle:"italic"}}>{e.notes}</div>}
                      {e.invoiceId && <InvoiceBadge invoiceId={e.invoiceId} />}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── FORM ──────────────────────────────────────────────────────────────────
  if (view==="form" && form) {
    const mi    = gmi(form);
    const mach  = form.machines[mi];
    const ci    = gci(form,mi);
    const comp  = mach.components[ci];
    const hi    = ghi(form,mi,ci);
    const entry = comp.serviceHistory[hi];

    const EEditor = () => (
      <div style={{background:C.white, border:`1px solid ${C.border}`, padding:mobile?12:16, minWidth:0, overflow:"hidden"}}>
        <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:6}}>
          <div style={{fontFamily:mono, fontSize:10, color:C.mute}}>ENTRY {hi+1} OF {comp.serviceHistory.length}</div>
          {comp.serviceHistory.length>1 && <Btn v="danger" click={()=>delEntry(mi,ci,hi)} ch="Remove Entry" s={{fontSize:9, padding:"4px 10px"}} />}
        </div>
        <EntryForm entry={entry} readingType={mach.readingType}
          onField={(f,v)=>updEntry(mi,ci,hi,f,v)}
          onAddFilter={()=>addFilt(mi,ci,hi)}
          onUpdFilter={(fi,f,v)=>updFilt(mi,ci,hi,fi,f,v)}
          onDelFilter={fi=>delFilt(mi,ci,hi,fi)}
        />
        <div style={{marginTop:14}}>
          <InvoiceUploader
            invoiceId={entry.invoiceId||null}
            onSaved={id=>updEntry(mi,ci,hi,"invoiceId",id)}
            onRemoved={()=>updEntry(mi,ci,hi,"invoiceId",null)}
          />
        </div>
      </div>
    );

    return (
      <div style={{minHeight:"100vh", background:C.bg, fontFamily:sans, color:C.dark}}>
        <Hdr acts={[
          <Btn key="c" v="ghost" click={()=>setView("list")} ch="Cancel" s={{fontSize:10, padding:"7px 12px"}} />,
          <Btn key="s" v="black" click={saveForm}            ch="Save ✓" s={{fontSize:10, padding:"7px 14px"}} />,
        ]} />
        <div style={{maxWidth:860, margin:"0 auto", padding:`20px ${mobile?12:20}px 80px`}}>
          <div style={{fontFamily:mono, fontSize:11, color:C.mute, letterSpacing:2, textTransform:"uppercase", marginBottom:18}}>{form.name?`Editing: ${form.name}`:"New Customer Record"}</div>
          <Flash f={flash} />

          {/* Customer */}
          <div style={pnl}>
            <SecHead c="Customer Details" />
            <Grid cols={2} mobile={1} bp={480} ch={<>
              <div><Lbl c="Full Name *" /><Inp value={form.name}    onChange={e=>upd("name",e.target.value)}    placeholder="John Smith" /></div>
              <div><Lbl c="Phone Number" /><Inp value={form.phone}  onChange={e=>upd("phone",e.target.value)}   placeholder="04XX XXX XXX" /></div>
            </>} />
            <Grid cols={2} mobile={1} bp={480} ch={<>
              <div><Lbl c="Email Address" /><Inp value={form.email}   onChange={e=>upd("email",e.target.value)}   placeholder="email@example.com" /></div>
              <div><Lbl c="Site / Address" /><Inp value={form.address} onChange={e=>upd("address",e.target.value)} placeholder="123 Station Rd, QLD" /></div>
            </>} />
          </div>

          {/* Machine tabs */}
          <div style={{display:"flex", flexWrap:"wrap"}}>
            {form.machines.map((m,i)=><TBtn key={m.id} a={mTab===i} click={()=>{setMTab(i);setCTab(0);setHIdx(0);}} ch={[m.year,m.make,m.model].filter(Boolean).join(" ")||`Machine ${i+1}`} />)}
            <TBtn a={false} click={addMachine} ch="+ Machine" />
          </div>
          <div style={{...pnl, borderTop:"none"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8}}>
              <SecHead c="Machine Details" />
              {form.machines.length>1 && <Btn v="danger" click={()=>delMachine(mi)} ch="Remove" s={{fontSize:10, padding:"5px 12px"}} />}
            </div>
            <Grid cols={3} mobile={1} bp={560} ch={<>
              <div><Lbl c="Make / Brand" /><Inp value={mach.make}  onChange={e=>upd(`machines.${mi}.make`,e.target.value)}  placeholder="Caterpillar" /></div>
              <div><Lbl c="Model" />       <Inp value={mach.model} onChange={e=>upd(`machines.${mi}.model`,e.target.value)} placeholder="320 Excavator" /></div>
              <div><Lbl c="Year" />        <Inp value={mach.year}  onChange={e=>upd(`machines.${mi}.year`,e.target.value)}  placeholder="2020" /></div>
            </>} />
            <Grid cols={2} mobile={1} bp={480} ch={<>
              <div><Lbl c="VIN / Serial" /><Inp value={mach.vin} onChange={e=>upd(`machines.${mi}.vin`,e.target.value)} placeholder="CAT0320XXXXX" /></div>
              <div><Lbl c="Reading Type" /><Sel ch={<><option value="km">Kilometres (km)</option><option value="hours">Machine Hours (hrs)</option></>} value={mach.readingType} onChange={e=>upd(`machines.${mi}.readingType`,e.target.value)} /></div>
            </>} />

            <Divider />
            <SubHead c="Components / Service Items" />

            {/* Component tabs */}
            <div style={{display:"flex", flexWrap:"wrap"}}>
              {mach.components.map((c,i)=><SBtn key={c.id} a={cTab===i} click={()=>{setCTab(i);setHIdx(0);}} ch={[c.type,c.model].filter(Boolean).join(" ")||`Component ${i+1}`} />)}
              <SBtn a={false} click={()=>addComp(mi)} ch="+ Component" />
            </div>
            <div style={{background:C.bg, border:`1px solid ${C.border}`, borderTop:"none", padding:mobile?10:14}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8}}>
                <div style={{fontFamily:mono, fontSize:10, fontWeight:"bold", letterSpacing:2, textTransform:"uppercase", color:C.mid}}>{[comp.type,comp.model].filter(Boolean).join(" — ")||`Component ${ci+1}`}</div>
                {mach.components.length>1 && <Btn v="danger" click={()=>delComp(mi,ci)} ch="Remove" s={{fontSize:10, padding:"4px 10px"}} />}
              </div>
              <Grid cols={3} mobile={1} bp={560} ch={<>
                <div><Lbl c="Component Type" /><Sel ch={<><option value="">Select type...</option>{COMPONENT_TYPES.map(t=><option key={t}>{t}</option>)}</>} value={comp.type} onChange={e=>upd(`machines.${mi}.components.${ci}.type`,e.target.value)} /></div>
                <div><Lbl c="Model" /><Inp value={comp.model||""} onChange={e=>upd(`machines.${mi}.components.${ci}.model`,e.target.value)} placeholder="e.g. C15, ZF6HP28" /></div>
                <div><Lbl c="Serial Number" /><Inp value={comp.serialNumber} onChange={e=>upd(`machines.${mi}.components.${ci}.serialNumber`,e.target.value)} placeholder="SN-XXXXXXXXX" /></div>
              </>} />

              <Divider />
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8}}>
                <div style={{fontFamily:mono, fontSize:10, fontWeight:"bold", letterSpacing:2, textTransform:"uppercase", color:C.dark}}>Service History — {comp.serviceHistory.length} {comp.serviceHistory.length===1?"Entry":"Entries"}</div>
                <Btn v="white" click={()=>addEntry(mi,ci)} ch="+ New Entry" s={{fontSize:10, padding:"6px 14px"}} />
              </div>

              {mobile ? (
                <div>
                  <div style={{marginBottom:10}}>
                    <Lbl c="Select Service Entry" />
                    <Sel ch={comp.serviceHistory.map((e,ei)=>(
                      <option key={e.id} value={ei}>{e.date||"No date"}{e.reading?" — "+e.reading+" "+(mach.readingType==="hours"?"hrs":"km"):""}{e.jobType?" — "+e.jobType:""}{e.invoiceId?" 📄":""}</option>
                    ))} value={hIdx} onChange={e=>setHIdx(Number(e.target.value))} />
                  </div>
                  <EEditor />
                </div>
              ) : (
                <div style={{display:"flex", gap:12}}>
                  <div style={{width:150, flexShrink:0}}>
                    {comp.serviceHistory.map((e,ei)=>(
                      <div key={e.id} onClick={()=>setHIdx(ei)}
                        style={{background:hi===ei?C.black:C.white, color:hi===ei?C.white:C.dark, border:`1px solid ${hi===ei?C.black:C.border}`, padding:"9px 10px", marginBottom:4, cursor:"pointer"}}>
                        <div style={{fontFamily:mono, fontSize:11, fontWeight:"bold"}}>{e.date||"No date"}</div>
                        <div style={{fontFamily:mono, fontSize:10, marginTop:2, color:hi===ei?"#ccc":C.mute}}>{e.reading?`${e.reading} ${mach.readingType==="hours"?"hrs":"km"}`:e.jobType||"—"}</div>
                        {e.invoiceId && <div style={{fontFamily:mono, fontSize:9, marginTop:3, color:hi===ei?"#99c0e8":C.blue}}>invoice</div>}
                      </div>
                    ))}
                  </div>
                  <div style={{flex:1, minWidth:0}}><EEditor /></div>
                </div>
              )}
            </div>
          </div>

          <div style={{display:"flex", justifyContent:"flex-end", gap:8, paddingBottom:40}}>
            <Btn v="ghost" click={()=>setView("list")} ch="Cancel" />
            <Btn v="black" click={saveForm}            ch="Save Record" />
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// Register service worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(()=>{});
  });
}
  </script>
</body>
</html>
